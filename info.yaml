# Tiny Tapeout project information
project:
  title:        "Pipeline Skid Buffer"      # Project title
  author:       "Rishikesh Sethuraman"      # Your name
  discord:      "dadurpydude"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A one-deep 8-bit pipeline skid buffer with ready/valid handshaking that supports full-throughput data transfer and backpressure without data loss."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_pipeline_skid_buffer"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "pipeline_skid_buffer.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "data_i[0]"
  ui[1]: "data_i[1]"
  ui[2]: "data_i[2]"
  ui[3]: "data_i[3]"
  ui[4]: "data_i[4]"
  ui[5]: "data_i[5]"
  ui[6]: "data_i[6]"
  ui[7]: "data_i[7]"

  # Outputs
  uo[0]: "data_o[0]"
  uo[1]: "data_o[1]"
  uo[2]: "data_o[2]"
  uo[3]: "data_o[3]"
  uo[4]: "data_o[4]"
  uo[5]: "data_o[5]"
  uo[6]: "data_o[6]"
  uo[7]: "data_o[7]"

  # Bidirectional pins
  uio[0]: "ready_i (input: downstream ready to accept)"
  uio[1]: "valid_i (input: upstream data valid)"
  uio[2]: "ready_o (output: upstream backpressure)"
  uio[3]: "valid_o (output: downstream data valid)"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
